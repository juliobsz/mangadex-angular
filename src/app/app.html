<main class="font-inter min-h-screen max-w-screen flex flex-col justify-center items-center bg-primary">
  <div class="flex flex-col w-3/5 border border-white/20 rounded-[50px] text-secondary my-20">
    <div class="flex flex-row items-center gap-6 px-36 py-20">
      <img ngSrc="/avatar.png" alt="avatar" class="w-1/7 rounded-full" height="564" width="564"/>
      <h1 class="text-6xl font-bold text-center">Julio!</h1>
    </div>
    <div class="px-36">
      @if (mangas$ | async; as mangas) {
        <div class="flex flex-col items-start mb-20">
          <h1 class="text-4xl font-semibold text-center mb-4">Favorites</h1>
          <div class="w-full mx-auto grid grid-cols-4 gap-4">
            @for (manga of mangas; track manga.id) {
              <div>
                <img ngSrc="{{ manga.cover }}" alt="{{ manga.id }}" class="w-full h-full object-cover rounded" width="200" height="300"/>
              </div>
            } @empty {
              <h1>No mangas</h1>
            }
          </div>
        </div>
        <div class="flex flex-col items-start mb-20">
          <h1 class="text-4xl font-semibold text-center mb-4">Recents</h1>
          <div class="w-full mx-auto grid grid-cols-4 gap-4">
            @for (manga of mangas; track manga.id) {
              <div>
                <img ngSrc="{{ manga.cover }}" alt="{{ manga.id }}" class="w-full h-full object-cover rounded" width="200" height="300"/>
              </div>
            } @empty {
              <h1>No mangas</h1>
            }
          </div>
        </div>
      } @else {
        <h1>Loading...</h1>
      }
    </div>
  </div>
</main>

<router-outlet />
